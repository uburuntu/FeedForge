name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Tier 1 Linux jobs are release-blocking. Tier 2 jobs are expected green and
# intentionally do not use continue-on-error; any temporary waiver requires the
# affected platform/toolchain, analysis, last-known-green commit, user impact,
# owner, and a time-bounded restoration plan in a tracked issue.
jobs:
  minimum-runtime-generated:
    name: Tier 1 / minimum ${{ matrix.name }} / C++20 compiler OFF
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC 11
            package: g++-11
            cxx: g++-11
          - name: Clang 14
            package: clang-14
            cxx: clang++-14
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install minimum compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build "${{ matrix.package }}"
      - name: Configure committed C++20 runtime and generated headers
        run: >-
          cmake -S . -B build/minimum -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          -DFEEDFORGE_BUILD_COMPILER=OFF
          -DFEEDFORGE_BUILD_TESTS=ON
          -DFEEDFORGE_BUILD_EXAMPLES=ON
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build build/minimum
      - name: Test
        run: ctest --test-dir build/minimum --output-on-failure
      - name: Install runtime-only package
        run: cmake --install build/minimum --prefix "${RUNNER_TEMP}/feedforge"
      - name: Consume installed canonical targets as C++20
        run: |
          cmake -S tests/consumer -B build/runtime-consumer -G Ninja \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/feedforge"
          cmake --build build/runtime-consumer --target run-feedforge-consumer

  big-endian-runtime-generated:
    name: Portability / emulated s390x big-endian / C++20 compiler OFF
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install s390x cross compiler and QEMU user emulator
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            g++-s390x-linux-gnu \
            ninja-build \
            qemu-user
      - name: Prove target byte order and executable architecture
        run: |
          cat >"${RUNNER_TEMP}/s390x-endian.cpp" <<'CPP'
          #include <bit>
          static_assert(std::endian::native == std::endian::big);
          int main() {
            return std::endian::native == std::endian::big ? 0 : 1;
          }
          CPP
          s390x-linux-gnu-g++ -std=c++20 \
            "${RUNNER_TEMP}/s390x-endian.cpp" \
            -o "${RUNNER_TEMP}/s390x-endian"
          file "${RUNNER_TEMP}/s390x-endian" | tee "${RUNNER_TEMP}/s390x-file.txt"
          grep -F "ELF 64-bit MSB" "${RUNNER_TEMP}/s390x-file.txt"
          grep -F "IBM S/390" "${RUNNER_TEMP}/s390x-file.txt"
          qemu-s390x -L /usr/s390x-linux-gnu "${RUNNER_TEMP}/s390x-endian"
      - name: Configure committed runtime and generated headers for s390x
        run: >-
          cmake -S . -B build/s390x -G Ninja
          -DCMAKE_TOOLCHAIN_FILE="${GITHUB_WORKSPACE}/cmake/toolchains/s390x-linux-gnu.cmake"
          -DCMAKE_BUILD_TYPE=Debug
          -DFEEDFORGE_BUILD_COMPILER=OFF
          -DFEEDFORGE_BUILD_TESTS=ON
          -DFEEDFORGE_BUILD_EXAMPLES=ON
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Cross-build runtime, generated tests, and examples
        run: cmake --build build/s390x --parallel 2
      # This packaging test recursively configures a child build without a
      # toolchain or emulator. All executable runtime tests remain included.
      - name: Run applicable runtime tests under qemu-s390x
        run: >-
          ctest --test-dir build/s390x --output-on-failure --no-tests=error
          -E '^consumer\.installed_'

  # Clang 18's concepts feature level hides libstdc++ 13's std::expected, so
  # compiler-on Clang jobs pair it with the matching libc++ 18 packages.
  current-full:
    name: Tier 1 / current ${{ matrix.name }} / mixed C++20+C++23
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            runner: ubuntu-latest
            cxx: g++
            cxxflags: ''
            libcxx: false
          - name: Clang
            runner: ubuntu-24.04
            cxx: clang++-18
            cxxflags: -stdlib=libc++
            libcxx: true
    env:
      CXXFLAGS: ${{ matrix.cxxflags }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Clang C++ standard library
        if: matrix.libcxx
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
      - name: Configure
        run: >-
          cmake --preset dev
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build --preset dev
      - name: Test full mixed-standard project
        run: ctest --preset dev
      - name: Verify canonical generated bytes
        run: cmake --build --preset dev --target check-generated

  generated-cpp23:
    name: Tier 1 / current ${{ matrix.name }} / generated C++23
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            runner: ubuntu-latest
            cxx: g++
            cxxflags: ''
            libcxx: false
          - name: Clang
            runner: ubuntu-24.04
            cxx: clang++-18
            cxxflags: -stdlib=libc++
            libcxx: true
    env:
      CXXFLAGS: ${{ matrix.cxxflags }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Clang C++ standard library
        if: matrix.libcxx
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
      - name: Configure generated compatibility probes
        run: >-
          cmake -S . -B build/generated-cpp23 -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          -DFEEDFORGE_BUILD_COMPILER=ON
          -DFEEDFORGE_BUILD_TESTS=ON
          -DFEEDFORGE_BUILD_EXAMPLES=OFF
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build C++23 generated targets
        run: >-
          cmake --build build/generated-cpp23
          --target feedforge_test_generated_cpp23
          feedforge_test_canonical_headers_cpp20
          feedforge_test_canonical_headers_cpp23
      - name: Run C++23 semantics and layout gates
        run: >-
          ctest --test-dir build/generated-cpp23 --output-on-failure
          -R 'generated_cpp23|canonical_headers_cpp23|generated_layout_cpp20_cpp23'

  no-exceptions-rtti:
    name: Tier 1 / Clang / C++20 no exceptions or RTTI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure explicit generated-runtime gate
        run: >-
          cmake --preset no-exceptions-rtti
          -DCMAKE_CXX_COMPILER=clang++
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build explicit gate
        run: cmake --build --preset no-exceptions-rtti
      - name: Run explicit gate
        run: ctest --preset no-exceptions-rtti

  sanitizers:
    name: Tier 1 / current Clang / ASan+UBSan
    runs-on: ubuntu-24.04
    env:
      CXXFLAGS: -stdlib=libc++
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Clang C++ standard library
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
      - name: Configure Clang ASan and UBSan
        run: >-
          cmake --preset sanitizers
          -DCMAKE_CXX_COMPILER=clang++-18
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build --preset sanitizers
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --preset sanitizers

  release:
    name: Tier 1 / current GCC / Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure
        run: cmake --preset release -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build --preset release
      - name: Test with NDEBUG active
        run: ctest --preset release

  installed-consumer:
    name: Tier 1 / installed generation consumer / C++20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure and build FeedForge
        run: |
          cmake --preset dev -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
          cmake --build --preset dev
      - name: Install
        run: cmake --install build/dev --prefix "${RUNNER_TEMP}/feedforge"
      - name: Configure external C++20 consumer
        run: >-
          cmake -S tests/consumer -B build/consumer -G Ninja
          -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/feedforge"
          -DFEEDFORGE_CONSUMER_KIND=generated
      - name: Build and run external consumer
        run: cmake --build build/consumer --target run-feedforge-consumer

  optional-rtsan:
    name: Tier 1 / optional current-Clang RTSan smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Feature-detect RealtimeSanitizer
        run: >-
          cmake --preset rtsan
          -DCMAKE_CXX_COMPILER=clang++
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build supported targets
        run: cmake --build --preset rtsan
      - name: Run smoke when configured
        run: >-
          ctest --test-dir build/rtsan --output-on-failure
          --no-tests=ignore -R '^hardening\.rtsan_smoke$'

  macos-appleclang:
    name: Tier 2 / macOS arm64 AppleClang / full compiler+runtime
    runs-on: macos-15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Confirm Tier 2 architecture
        run: test "$(uname -m)" = arm64
      - name: Record AppleClang identity
        run: clang++ --version
      - name: Configure compiler-enabled mixed C++20+C++23 project
        run: >-
          cmake --preset dev
          -DCMAKE_CXX_COMPILER=clang++
          -DFEEDFORGE_BUILD_COMPILER=ON
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build full project
        run: cmake --build --preset dev
      - name: Test full compiler and runtime project
        run: ctest --preset dev
      - name: Verify canonical generated bytes on macOS
        run: cmake --build --preset dev --target check-generated

  windows-msvc:
    name: Tier 2 / Windows x64 MSVC 2022 / runtime+generated
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure compiler-off C++20 project
        run: >-
          cmake -S . -B build/msvc
          -G "Visual Studio 17 2022" -A x64
          -DFEEDFORGE_BUILD_COMPILER=OFF
          -DFEEDFORGE_BUILD_TESTS=ON
          -DFEEDFORGE_BUILD_EXAMPLES=ON
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build build/msvc --config Debug
      - name: Test
        run: ctest --test-dir build/msvc -C Debug --output-on-failure

  windows-clangcl-compiler:
    name: Tier 2 / Windows x64 ClangCL / clean-output compiler generation
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure compiler-enabled ClangCL project
        run: >-
          cmake -S . -B build/clangcl
          -G "Visual Studio 17 2022" -A x64 -T ClangCL
          -DFEEDFORGE_BUILD_COMPILER=ON
          -DFEEDFORGE_BUILD_TESTS=ON
          -DFEEDFORGE_BUILD_EXAMPLES=OFF
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build compiler and compiler tests
        run: cmake --build build/clangcl --config Debug
      - name: Record compiler capability
        shell: pwsh
        run: |
          $compiler = "build/clangcl/src/feedforgec/Debug/feedforgec.exe"
          & $compiler --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "::notice title=Windows compiler boundary::This gate covers clean-output generation with the installed Visual Studio ClangCL toolset. The atomic replacement test remains outside the Windows support claim."
      - name: Run compiler tests supported by the clean-output capability
        run: >-
          ctest --test-dir build/clangcl -C Debug --output-on-failure
          --no-tests=error -R '^compiler\.'
          -E '^compiler\.emit_atomic_deterministic$'
      - name: Verify canonical generated bytes with ClangCL host compiler
        run: >-
          cmake --build build/clangcl --config Debug --target check-generated

  release-assets:
    name: Release assets / deterministic source archives
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Test builder and reproduce exact-commit assets
        run: make release-assets-check RELEASE_REVISION="${GITHUB_SHA}"

  ci-required:
    if: always()
    name: CI required
    needs:
      - minimum-runtime-generated
      - big-endian-runtime-generated
      - current-full
      - generated-cpp23
      - no-exceptions-rtti
      - sanitizers
      - release
      - installed-consumer
      - optional-rtsan
      - macos-appleclang
      - windows-msvc
      - windows-clangcl-compiler
      - release-assets
    runs-on: ubuntu-24.04
    steps:
      - name: Require every CI job to succeed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          jobs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: details["result"]
              for name, details in jobs.items()
              if details["result"] != "success"
          }
          for name, details in sorted(jobs.items()):
              print(f"{name}: {details['result']}")
          if failed:
              raise SystemExit(f"required CI jobs did not succeed: {failed}")
          PY
