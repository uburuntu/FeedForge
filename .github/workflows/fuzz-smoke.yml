name: Fuzz smoke

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz-smoke:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    env:
      CXXFLAGS: -stdlib=libc++
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: BinaryFILE cursor
            executable: build/fuzz/fuzz/fuzz_binary_file
            corpus: build/fuzz/fuzz/corpus/binary_file
            artifact: binary-file
          - name: All-message decode_one
            executable: build/fuzz/fuzz/fuzz_decode_one
            corpus: build/fuzz/fuzz/corpus/decode_one
            artifact: decode-one
          - name: Independent differential decode
            executable: build/fuzz/fuzz/fuzz_differential_decode
            corpus: build/fuzz/fuzz/corpus/differential_decode
            artifact: differential-decode
          - name: BinaryFILE replay
            executable: build/fuzz/fuzz/fuzz_replay
            corpus: build/fuzz/fuzz/corpus/replay
            artifact: replay
          - name: Compiler schema frontend
            executable: build/fuzz/fuzz/fuzz_compiler_schema
            corpus: build/fuzz/fuzz/corpus/compiler_schema
            artifact: compiler-schema
          - name: Compiler pipeline frontend
            executable: build/fuzz/fuzz/fuzz_compiler_pipeline
            corpus: build/fuzz/fuzz/corpus/compiler_pipeline
            artifact: compiler-pipeline
          - name: Compiler lowering and emission
            executable: build/fuzz/fuzz/fuzz_compiler_compile
            corpus: build/fuzz/fuzz/corpus/compiler_compile
            artifact: compiler-compile

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Clang C++ standard library
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
      - name: Configure Clang libFuzzer
        run: >-
          cmake --preset fuzz
          -DCMAKE_CXX_COMPILER=clang++-18
          -DFEEDFORGE_WARNINGS_AS_ERRORS=ON
      - name: Build all required fuzz targets
        run: cmake --build --preset fuzz
      - name: Prepare artifact directory
        run: mkdir -p "${RUNNER_TEMP}/fuzz-artifacts/${{ matrix.artifact }}"
      - name: Run deterministic fuzz smoke
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          FUZZ_SECONDS: ${{ github.event_name == 'schedule' && '300' || '15' }}
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: >-
          "${{ matrix.executable }}"
          "${{ matrix.corpus }}"
          -seed=300
          -max_total_time="${FUZZ_SECONDS}"
          -max_len=4096
          -timeout=5
          -print_final_stats=1
          -artifact_prefix="${RUNNER_TEMP}/fuzz-artifacts/${{ matrix.artifact }}/"
      - name: Upload failing input
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-${{ matrix.artifact }}-${{ github.run_id }}
          path: ${{ runner.temp }}/fuzz-artifacts/${{ matrix.artifact }}/
          if-no-files-found: ignore

  fuzz-required:
    if: always()
    name: Fuzz required
    needs: fuzz-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Require every fuzz target to succeed
        env:
          FUZZ_RESULT: ${{ needs.fuzz-smoke.result }}
        run: |
          printf 'fuzz-smoke: %s\n' "${FUZZ_RESULT}"
          test "${FUZZ_RESULT}" = success
