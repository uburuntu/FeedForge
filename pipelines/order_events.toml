format_version = 1
name = "itch50_order_events"
namespace = "feedforge::generated::nasdaq::itch50_order_events"
schema = "nasdaq_totalview_itch_5_0"
profile = "portable_checked"
unknown_messages = "error"
unselected_messages = "skip"

[[emit]]
source = "A"
event = "add_order"
fields = [
  "stock_locate",
  "timestamp",
  "order_reference_number",
  "buy_sell_indicator",
  "shares",
  "stock",
  "price",
]

[[emit]]
source = "F"
event = "add_order_mpid"
fields = [
  "stock_locate",
  "timestamp",
  "order_reference_number",
  "buy_sell_indicator",
  "shares",
  "stock",
  "price",
  "attribution",
]

[[emit]]
source = "E"
event = "order_executed"
fields = [
  "stock_locate",
  "timestamp",
  "order_reference_number",
  "executed_shares",
  "match_number",
]

[[emit]]
source = "C"
event = "order_executed_with_price"
fields = [
  "stock_locate",
  "timestamp",
  "order_reference_number",
  "executed_shares",
  "match_number",
  "printable",
  "execution_price",
]

[[emit]]
source = "X"
event = "order_cancel"
fields = [
  "stock_locate",
  "timestamp",
  "order_reference_number",
  "cancelled_shares",
]

[[emit]]
source = "D"
event = "order_delete"
fields = [
  "stock_locate",
  "timestamp",
  "order_reference_number",
]

[[emit]]
source = "U"
event = "order_replace"
fields = [
  "stock_locate",
  "timestamp",
  "original_order_reference_number",
  "new_order_reference_number",
  "shares",
  "price",
]

[[emit]]
source = "P"
event = "trade"
fields = [
  "stock_locate",
  "timestamp",
  "order_reference_number",
  "buy_sell_indicator",
  "shares",
  "stock",
  "price",
  "match_number",
]
